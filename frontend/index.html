<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surveillance Analysis Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Left Side: Video Upload (65%) -->
        <div class="left-panel">
            <div class="upload-container">
                <input type="file" id="video-upload" accept="video/mp4,video/x-m4v,video/*" hidden>
                <button id="upload-btn" class="upload-button">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="upload-icon"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    Upload Video
                </button>
                <p id="file-name" class="file-name-display"></p>
            </div>
        </div>

        <!-- Right Side (35%) -->
        <div class="right-panel">
            <!-- Right Top: Calendar (50%) -->
            <div class="right-top">
                <div class="calendar-header">
                    <button id="prev-month" class="nav-btn">&lt;</button>
                    <h2 id="month-year-display">Month Year</h2>
                    <button id="next-month" class="nav-btn">&gt;</button>
                </div>
                <div class="calendar-grid">
                    <div class="weekday">Sun</div>
                    <div class="weekday">Mon</div>
                    <div class="weekday">Tue</div>
                    <div class="weekday">Wed</div>
                    <div class="weekday">Thu</div>
                    <div class="weekday">Fri</div>
                    <div class="weekday">Sat</div>
                </div>
                <div id="calendar-days" class="calendar-grid days-grid">
                    <!-- Days will be generated by JS -->
                </div>
            </div>

            <!-- Right Bottom: Summary Display (50%) -->
            <div class="right-bottom">
                <h3>Analysis Summary</h3>
                <h4 id="selected-date-display">Select a date</h4>
                <div id="summary-content" class="summary-content">
                    <p class="placeholder-text">Click on a date in the calendar to view its video analysis summary.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
